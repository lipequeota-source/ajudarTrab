<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
           <h1>Limpador ajudante de Senha para UNIMED INTERCAMBIO</h1>
            <p>By Felipe Marques</p>
            <p>MATRICULA: 14660</p>
        </header>

        <div class="main-content">
            <div class="card">
                <label for="inputArea">Texto de Entrada:</label>
                <textarea id="inputArea" placeholder="Cole aqui as linhas de texto...\nExemplo:\nSenha | 4 | 8 | 2 | 7 | 1 | 2 | 0 |\n| 4 | 7 | 6 | 8 | 6 | 0 | 6 |"></textarea>
            </div>

            <div class="card">
                <label for="outputArea">Resultado Limpo:</label>
                <textarea id="outputArea" readonly placeholder="Os números processados aparecerão aqui automaticamente..."></textarea>
                <button id="copyBtn" class="btn">Copiar Resultado</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
