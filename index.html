<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="assets/icone.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Números PRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">Ferramenta Utilitária</span>
            <h1>Extrator de Senhas e Números</h1>
            <p>Cole o texto formatado com barras ou texto misto e obtenha apenas as sequências numéricas limpas em tempo real.</p>
        </header>

        <div class="main-content">
            <div class="card">
                <div class="card-header">
                    <label for="inputArea">Texto de Entrada</label>
                </div>
                <textarea id="inputArea" placeholder="Cole aqui as linhas de texto...&#10;&#10;Exemplo:&#10;Senha | 4 | 8 | 2 | 7 | 1 | 2 | 0 |&#10;| 4 | 7 | 6 | 8 | 6 | 0 | 6 |"></textarea>
            </div>

            <div class="card">
                <div class="card-header">
                    <label for="outputArea">Resultado Limpo</label>
                    <button id="copyBtn" class="btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copiar
                    </button>
                </div>
                <textarea id="outputArea" readonly placeholder="Os números processados aparecerão aqui automaticamente..."></textarea>
            </div>
        </div>

        <footer>
            <p>Desenvolvido por <span class="highlight">Felipe Marques</span> &bull; Matrícula: <span class="highlight">14660</span></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
